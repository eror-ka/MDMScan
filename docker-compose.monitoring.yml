# Опциональный мониторинг-стек: Prometheus + Grafana + Loki + Promtail
#
# Использование:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Доступ:
#   Grafana   → http://localhost:3001  (admin / admin)
#   Prometheus → http://localhost:9091

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: mdmscan-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9091:9090"
    networks:
      - mdmscan-net

  loki:
    image: grafana/loki:latest
    container_name: mdmscan-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - mdmscan-net

  promtail:
    image: grafana/promtail:latest
    container_name: mdmscan-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - mdmscan-net

  grafana:
    image: grafana/grafana:latest
    container_name: mdmscan-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - mdmscan-net

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
