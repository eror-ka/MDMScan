name: mdmscan

services:
  postgres:
    image: postgres:latest
    container_name: mdmscan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdmscan-net

  minio:
    image: minio/minio:latest
    container_name: mdmscan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdmscan-net

  minio-init:
    image: minio/mc:latest
    container_name: mdmscan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      SCAN_RETENTION_DAYS: ${SCAN_RETENTION_DAYS:-5}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"

        for b in raw-scans reports sboms temp; do
          mc mb --ignore-existing "local/$$b"
        done
        echo "MinIO buckets ready: raw-scans, reports, sboms, temp"

        # Lifecycle policy: raw-scans удаляются после SCAN_RETENTION_DAYS дней
        mc ilm rule add --expire-days "$$SCAN_RETENTION_DAYS" local/raw-scans 2>/dev/null \
          || mc ilm add --expiry-days "$$SCAN_RETENTION_DAYS" local/raw-scans 2>/dev/null \
          || echo "ILM raw-scans: skipped (rule may already exist)"

        # Lifecycle policy: temp удаляется через 1 день
        mc ilm rule add --expire-days 1 local/temp 2>/dev/null \
          || mc ilm add --expiry-days 1 local/temp 2>/dev/null \
          || echo "ILM temp: skipped (rule may already exist)"

        echo "MinIO lifecycle policies applied"
    networks:
      - mdmscan-net
    restart: "no"

  redis:
    image: redis:latest
    container_name: mdmscan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdmscan-net

  api:
    build:
      context: ./services/api
    image: mdmscan-api:latest
    container_name: mdmscan-api
    restart: unless-stopped
    environment:
      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: redis://redis:6379/0
      MINIAPP_BOT_TOKEN: ${BOT_MINIAPP_TOKEN}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mdmscan-net

  web:
    build:
      context: ./services/web
    image: mdmscan-web:latest
    container_name: mdmscan-web
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - mdmscan-net

  bot:
    build:
      context: ./services/bot
    image: mdmscan-bot:latest
    container_name: mdmscan-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - mdmscan-net

  miniapp-bot:
    build:
      context: ./services/miniapp_bot
    image: mdmscan-miniapp-bot:latest
    container_name: mdmscan-miniapp-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_MINIAPP_TOKEN}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
    networks:
      - mdmscan-net

  worker:
    build:
      context: ./services/worker
    image: mdmscan-worker:latest
    container_name: mdmscan-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_RAW: raw-scans
      SCAN_WORKDIR: /tmp/scans
      SCAN_TIMEOUT_SECONDS: ${SCAN_TIMEOUT_SECONDS:-1800}
      SCAN_RETENTION_DAYS: ${SCAN_RETENTION_DAYS:-5}
      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      CELERY_LOGLEVEL: INFO
      CELERY_CONCURRENCY: 2
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-metrics
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:z
      - scan_tmp:/tmp/scans
      - prometheus_metrics:/tmp/prometheus-metrics
    networks:
      - mdmscan-net

  beat:
    image: mdmscan-worker:latest
    container_name: mdmscan-beat
    restart: unless-stopped
    command: >
      sh -c "rm -f /tmp/prometheus-metrics/*.db 2>/dev/null || true
             && celery -A app.tasks beat
                --loglevel=$${CELERY_LOGLEVEL:-INFO}
                --schedule=/tmp/celerybeat-schedule"
    environment:
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_RAW: raw-scans
      SCAN_WORKDIR: /tmp/scans
      SCAN_TIMEOUT_SECONDS: ${SCAN_TIMEOUT_SECONDS:-1800}
      SCAN_RETENTION_DAYS: ${SCAN_RETENTION_DAYS:-5}
      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      CELERY_LOGLEVEL: INFO
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-metrics
      METRICS_SERVER: "true"
      METRICS_PORT: "9090"
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:z
      - scan_tmp:/tmp/scans
      - prometheus_metrics:/tmp/prometheus-metrics
    networks:
      - mdmscan-net

volumes:
  pg_data:
  minio_data:
  redis_data:
  scan_tmp:
  prometheus_metrics:

networks:
  mdmscan-net:
    driver: bridge
